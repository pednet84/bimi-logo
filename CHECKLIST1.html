<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist de Atividades</title>

<style>

body{
    background:#191919;
    color:#e6e6e6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#202020;
    padding:30px;
    border-radius:10px;
    width:420px;
    box-shadow:0 0 0 1px rgba(255,255,255,0.08);
}

h2{
    margin-top:0;
    font-weight:600;
}

.task{
    display:flex;
    align-items:center;
    padding:8px 0;
}

.task input{
    margin-right:10px;
    transform:scale(1.2);
}

.master{
    border-bottom:1px solid #333;
    padding-bottom:10px;
    margin-bottom:15px;
}

.task label{
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Checklist de Atividades</h2>

<div class="task master">
<input type="checkbox" id="checkAll" onclick="toggleAll(this)">
<label><strong>Marcar / Desmarcar Todas</strong></label>
</div>

<div class="task">
<input type="checkbox" class="item">
<label>Solicitar Arquivos de Ponto Eletrônico (.txt)</label>
</div>

<div class="task">
<input type="checkbox" class="item">
<label>Pós Solicitação - Encaminhar .txt</label>
</div>

<div class="task">
<input type="checkbox" class="item">
<label>Recebimento de Folhas de Pontos - Geradas</label>
</div>

</div>

<script>

function toggleAll(source){
    const checkboxes = document.querySelectorAll(".item");
    checkboxes.forEach(cb => cb.checked = source.checked);
}

</script>

</body>
</html>
