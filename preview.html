<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste HTML Notion</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .card{
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(0,0,0,0.1);
        text-align:center;
        width:320px;
    }

    h1{
        margin-top:0;
        color:#333;
    }

    p{
        color:#666;
    }

    button{
        margin-top:15px;
        padding:10px 18px;
        border:none;
        border-radius:8px;
        background:#4f46e5;
        color:white;
        font-size:14px;
        cursor:pointer;
    }

    button:hover{
        background:#4338ca;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Teste no Notion</h1>
    <p>Este é um HTML simples para verificar como a visualização funciona.</p>
    <button onclick="alert('Funcionou! 🎉')">Clique aqui</button>
</div>

</body>
</html>
